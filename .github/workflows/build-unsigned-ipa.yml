name: Build Unsigned IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift Package dependencies
        run: |
          if [ -f "*.xcworkspace" ] || ls *.xcworkspace 1> /dev/null 2>&1; then
            WORKSPACE=$(ls *.xcworkspace | head -1)
            xcodebuild -resolvePackageDependencies -workspace "$WORKSPACE" -scheme MeloCafe
          else
            PROJ=$(ls *.xcodeproj | head -1)
            xcodebuild -resolvePackageDependencies -project "$PROJ" -scheme MeloCafe
          fi

      - name: Build app (no code signing)
        run: |
          if ls *.xcworkspace 1> /dev/null 2>&1; then
            WORKSPACE=$(ls *.xcworkspace | head -1)
            xcodebuild \
              -workspace "$WORKSPACE" \
              -scheme MeloCafe \
              -configuration Release \
              -sdk iphoneos \
              -destination generic/platform=iOS \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              PRODUCT_BUNDLE_IDENTIFIER=com.unsigned.melocafe \
              clean build \
              CONFIGURATION_BUILD_DIR=$PWD/build/Release-iphoneos
          else
            PROJ=$(ls *.xcodeproj | head -1)
            xcodebuild \
              -project "$PROJ" \
              -scheme MeloCafe \
              -configuration Release \
              -sdk iphoneos \
              -destination generic/platform=iOS \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              PRODUCT_BUNDLE_IDENTIFIER=com.unsigned.melocafe \
              clean build \
              CONFIGURATION_BUILD_DIR=$PWD/build/Release-iphoneos
          fi

      - name: Package as unsigned IPA
        run: |
          APP_PATH=$(find build/Release-iphoneos -name "*.app" | head -1)
          echo "Found app at: $APP_PATH"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/

          zip -r MeloCafe-unsigned.ipa Payload
          echo "IPA created: MeloCafe-unsigned.ipa"
          ls -lh MeloCafe-unsigned.ipa

      - name: Upload unsigned IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeloCafe-unsigned-ipa
          path: MeloCafe-unsigned.ipa
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: MeloCafe-unsigned.ipa
          name: MeloCafe ${{ github.ref_name }} (Unsigned)
          body: |
            ## MeloCafe Unsigned IPA

            ไฟล์ IPA นี้ **ไม่มีลายเซ็น (unsigned)** — ต้องใช้งานผ่าน:
            - **LiveContainer** (ไม่ต้องเซ็นต์เพิ่ม)
            - **AltStore / Sideloadly** (เซ็นต์ด้วย Apple ID ของตัวเอง)
            - **TrollStore** (สำหรับ iOS ที่รองรับ)

            ### JIT Support
            LiveContainer รองรับ JIT โดยตรง ไม่ต้องตั้งค่าเพิ่มเติม
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
