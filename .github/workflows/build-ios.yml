name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: |
          echo "=== Xcode Version ==="
          xcodebuild -version
          echo ""
          echo "=== Available SDKs ==="
          xcodebuild -showsdks

      - name: Install dependencies
        run: |
          brew update
          brew install cmake ninja nasm

      - name: Cache vcpkg dependencies
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/downloads
            vcpkg/buildtrees
            vcpkg/installed
          key: ${{ runner.os }}-vcpkg-ios-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-ios-

      - name: Setup vcpkg
        run: |
          if [ ! -d "vcpkg" ]; then
            git clone https://github.com/Microsoft/vcpkg.git
          fi
          cd vcpkg
          ./bootstrap-vcpkg.sh

      - name: Apply pre-emptive build fixes
        run: |
          chmod +x apply-all-fixes.sh fix-opengl-headers.sh fix-shader-versions.sh || true
          [ -f apply-all-fixes.sh ] && ./apply-all-fixes.sh || echo "Fix scripts not found, skipping..."
          echo "Pre-emptive fixes applied!"

      - name: Configure CMake for iOS
        run: |
          cmake -S . -B build-ios \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=ios.toolchain.cmake \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_C_FLAGS="-fvisibility=hidden -fno-common" \
            -DCMAKE_CXX_FLAGS="-fvisibility=hidden -fvisibility-inlines-hidden -fno-common" \
            -G Ninja

      - name: Build MeloCafe
        run: |
          cmake --build build-ios --config Release -j$(sysctl -n hw.ncpu)

      - name: Create app bundle
        run: |
          APP_BUNDLE="build-ios/MeloCafe.app"
          rm -rf "$APP_BUNDLE"
          mkdir -p "$APP_BUNDLE"

          # Copy executable
          if [ -f "build-ios/bin/Cemu_release" ]; then
            cp build-ios/bin/Cemu_release "$APP_BUNDLE/MeloCafe"
          elif [ -f "build-ios/bin/Cemu" ]; then
            cp build-ios/bin/Cemu "$APP_BUNDLE/MeloCafe"
          else
            echo "Error: Executable not found"
            find build-ios -type f -name "Cemu*" -o -name "Cemu_release*"
            exit 1
          fi

          chmod +x "$APP_BUNDLE/MeloCafe"

          # Copy Info.plist
          cp ios/Info.plist "$APP_BUNDLE/"

          # Create resource directories
          mkdir -p "$APP_BUNDLE/Resources"
          mkdir -p "$APP_BUNDLE/lib"

      - name: Sign with entitlements
        run: |
          codesign --force --deep --sign - \
            --entitlements ios/entitlements.plist \
            --timestamp=none \
            build-ios/MeloCafe.app

      - name: Create IPA
        run: |
          mkdir -p build-ios/ipa/Payload
          cp -r build-ios/MeloCafe.app build-ios/ipa/Payload/
          cd build-ios/ipa
          zip -r ../MeloCafe-unsigned.ipa Payload/
          cd -

      - name: Show IPA info
        run: |
          echo "=== IPA Size ==="
          ls -lh build-ios/MeloCafe-unsigned.ipa
          echo ""
          echo "=== App Bundle Contents ==="
          ls -lh build-ios/MeloCafe.app/

      - name: Upload unsigned IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeloCafe-iOS-arm64-unsigned
          path: build-ios/MeloCafe-unsigned.ipa
          retention-days: 90

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build-ios/MeloCafe-unsigned.ipa
          name: MeloCafe ${{ github.ref_name }} for iOS
          body: |
            ## MeloCafe iOS IPA (Unsigned)

            ไฟล์ IPA นี้สำหรับ iOS (iPhone/iPad) เป็นไฟล์ unsigned ที่ต้องติดตั้งผ่าน:

            ### วิธีติดตั้ง

            **LiveContainer (แนะนำ)**
            - ไม่ต้องเซ็นต์เพิ่ม
            - รองรับ JIT โดยตรง
            - ดาวน์โหลด LiveContainer และนำเข้าไฟล์ IPA

            **AltStore / Sideloadly**
            - เซ็นต์ด้วย Apple ID ของตัวเอง
            - ต้อง refresh ทุก 7 วัน

            **TrollStore**
            - ถาวร (ไม่ต้องเซ็นต์ซ้ำ)
            - ต้องมี TrollStore บนเครื่องก่อน

            ### ความต้องการระบบ
            - iOS 14.0 หรือใหม่กว่า
            - iPhone 8 ขึ้นไป
            - แนะนำ: iPhone 12 ขึ้นไปเพื่อประสิทธิภาพสูงสุด

            ### JIT Support
            LiveContainer รองรับ JIT โดยอัตโนมัติ ไม่ต้องตั้งค่าเพิ่มเติม
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}