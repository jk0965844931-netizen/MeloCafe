name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: 'recursive'

      - name: Install dependencies
        run: |
          brew install ninja cmake sdl2 pkg-config curl openssl rapidjson pugixml glm zstd libzip

      - name: Apply pre-emptive build fixes
        run: |
          # Temporarily disabled - fixes are breaking CMake configuration
          echo "Skipping pre-emptive build fixes for debugging..."
          # chmod +x apply-all-fixes.sh fix-opengl-headers.sh fix-shader-versions.sh || true
          # [ -f apply-all-fixes.sh ] && ./apply-all-fixes.sh || echo "Fix scripts not found, skipping..."
          echo "Pre-emptive fixes SKIPPED!"

      - name: Configure CMake for iOS
        run: |
          cmake -S . -B build-ios \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=.github/ios-build-toolchain.cmake \
            -DENABLE_VCPKG=OFF \
            -DIS_IOS=ON \
            -G Ninja \
            2>&1 | tee cmake-output.log || exit 1

      - name: Upload CMake output (always)
        uses: actions/upload-artifact@v4
        with:
          name: cmake-output-log
          path: cmake-output.log

      - name: Check CMake targets
        run: |
          echo "=== Checking for build.ninja ==="
          ls -la build-ios/build.ninja 2>/dev/null || echo "build.ninja not found"
          echo "=== Checking for CemuBin target ==="
          grep -r "CemuBin" build-ios/CMakeFiles/ 2>/dev/null || echo "CemuBin not found in CMakeFiles"
          echo "=== All targets ==="
          cmake --build build-ios --target help 2>&1 | head -50 || echo "No targets available"

      - name: Build MeloCafe
        run: |
          cmake --build build-ios --config Release -j$(sysctl -n hw.ncpu) --verbose \
            2>&1 | tee build-output.log || exit 1
          echo "=== Build verification ==="
          find build-ios -type f -name "Cemu*" 2>/dev/null || echo "No Cemu files found"
          find build-ios -type f -executable 2>/dev/null | head -10 || echo "No executables found"
          echo "=== build-ios directory structure ==="
          ls -la build-ios/ || true

      - name: Upload build output (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-log
          path: build-output.log

      - name: List build output
        run: |
          echo "=== Full build-ios directory structure ===" > build-listing.txt
          tree build-ios 2>/dev/null || find build-ios -type f >> build-listing.txt || echo "No files found" >> build-listing.txt
          echo "\n=== CMakeCache.txt relevant entries ===" >> build-listing.txt
          grep -E "CMAKE_RUNTIME_OUTPUT_DIRECTORY|EXECUTABLE_OUTPUT_PATH|CemuBin" build-ios/CMakeCache.txt 2>/dev/null || echo "CMakeCache.txt not found" >> build-listing.txt
          echo "\n=== build-ios directory listing ===" >> build-listing.txt
          ls -la build-ios/ >> build-listing.txt
          cat build-listing.txt

      - name: Upload build listing (always)
        uses: actions/upload-artifact@v4
        with:
          name: build-listing
          path: build-listing.txt

      - name: Create app bundle
        run: |
          APP_BUNDLE="build-ios/MeloCafe.app"
          rm -rf "$APP_BUNDLE"
          mkdir -p "$APP_BUNDLE"

          # Copy executable
          if [ -f "build-ios/bin/CemuBin" ]; then
            cp build-ios/bin/CemuBin "$APP_BUNDLE/MeloCafe"
          elif [ -f "build-ios/bin/Cemu" ]; then
            cp build-ios/bin/Cemu "$APP_BUNDLE/MeloCafe"
          elif [ -f "build-ios/bin/Cemu_release" ]; then
            cp build-ios/bin/Cemu_release "$APP_BUNDLE/MeloCafe"
          else
            echo "Error: Executable not found"
            find build-ios -type f -executable
            exit 1
          fi

          chmod +x "$APP_BUNDLE/MeloCafe"

          # Copy Info.plist
          cp ios/Info.plist "$APP_BUNDLE/"

          # Create resource directories
          mkdir -p "$APP_BUNDLE/Resources"
          mkdir -p "$APP_BUNDLE/lib"

      - name: Sign with entitlements
        run: |
          codesign --force --deep --sign - \
            --entitlements ios/entitlements.plist \
            --timestamp=none \
            build-ios/MeloCafe.app

      - name: Create IPA
        run: |
          mkdir -p build-ios/ipa/Payload
          cp -r build-ios/MeloCafe.app build-ios/ipa/Payload/
          cd build-ios/ipa
          zip -r ../MeloCafe-unsigned.ipa Payload/
          cd -

      - name: Show IPA info
        run: |
          echo "=== IPA Size ==="
          ls -lh build-ios/MeloCafe-unsigned.ipa
          echo ""
          echo "=== App Bundle Contents ==="
          ls -lh build-ios/MeloCafe.app/

      - name: Upload unsigned IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeloCafe-iOS-arm64-unsigned
          path: build-ios/MeloCafe-unsigned.ipa
          retention-days: 90

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build-ios/MeloCafe-unsigned.ipa
          name: MeloCafe ${{ github.ref_name }} for iOS
          body: |
            ## MeloCafe iOS IPA (Unsigned)

            ไฟล์ IPA นี้สำหรับ iOS (iPhone/iPad) เป็นไฟล์ unsigned ที่ต้องติดตั้งผ่าน:

            ### วิธีติดตั้ง

            **LiveContainer (แนะนำ)**
            - ไม่ต้องเซ็นต์เพิ่ม
            - รองรับ JIT โดยตรง
            - ดาวน์โหลด LiveContainer และนำเข้าไฟล์ IPA

            **AltStore / Sideloadly**
            - เซ็นต์ด้วย Apple ID ของตัวเอง
            - ต้อง refresh ทุก 7 วัน

            **TrollStore**
            - ถาวร (ไม่ต้องเซ็นต์ซ้ำ)
            - ต้องมี TrollStore บนเครื่องก่อน

            ### ความต้องการระบบ
            - iOS 14.0 หรือใหม่กว่า
            - iPhone 8 ขึ้นไป
            - แนะนำ: iPhone 12 ขึ้นไปเพื่อประสิทธิภาพสูงสุด

            ### JIT Support
            LiveContainer รองรับ JIT โดยอัตโนมัติ ไม่ต้องตั้งค่าเพิ่มเติม
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}